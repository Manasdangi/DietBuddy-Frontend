</div>
<div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
<button class="px-5 py-2 rounded-full primary-gradient text-white font-label-sm whitespace-nowrap">All Foods</button>
<button class="px-5 py-2 rounded-full bg-white border border-zinc-100 text-zinc-600 font-label-sm whitespace-nowrap hover:bg-zinc-50 transition-colors">Favorites</button>

</section>

<span class="text-4xl font-bold tracking-tighter text-rose-600">642</span>
<span class="text-zinc-400 font-medium">kcal</span>
</div>
</div>

<div class="h-full bg-blue-400 w-[30%]"></div>

<p class="text-label-sm text-zinc-400 uppercase tracking-wide">190 kcal • 200g</p>

<button class="w-10 h-10 flex items-center justify-center rounded-full bg-zinc-50 text-rose-500 group-hover:primary-gradient group-hover:text-white transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="add">add</span>

</div>
</section>
