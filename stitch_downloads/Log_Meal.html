<style>

            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card-heavy {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

            box-shadow: 0 0 20px rgba(244, 63, 94, 0.2);
        }

            background-color: #09090B;

<body class="bg-obsidian text-on-surface font-body-md min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 border-b border-white/10 bg-zinc-950/40 backdrop-blur-xl flex justify-between items-center px-5 h-16 w-full">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden border border-white/20">
<img class="w-full h-full object-cover" data-alt="close-up portrait of a fitness professional with warm studio lighting and dark background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuARzISq9iwSQCV-PCTf1qkXvB-Ka4RX5LMkQ2YiH1VujBrXO0LI7SNrczxyQIIwMsidVtEdEKTqVDxUobqrkcgLZCv7ta9ysYhqadY1bXWBBmfmQi9sxn1Uh2QvSGot_D6hu3yfwEi32K2GRakiRNC18rwBMk3WUTHgD6rFVNWPO62hvFXPqZTxn_me4ujl8JdJpr0RUgtSYvkO7W5sU6e0hKPv_Iwr2tLDNPQHFe-eL9KXVmQ4xMPqbAlc58FkYsUfqgaFe7Vdxy2L"/>
</div>
<h1 class="text-xl font-bold tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-rose-500 to-rose-400 font-sans antialiased tracking-tight">DietBuddy</h1>
</div>
<button class="text-rose-500 active:scale-95 duration-200">
<span class="material-symbols-outlined">barcode_scanner</span>
</button>
</header>
<main class="pt-20 px-container-margin space-y-lg">
<!-- Search Section -->
<section class="mt-4">
<div class="glass-card-heavy rounded-full px-5 py-3 flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant">search</span>
<input class="bg-transparent border-none focus:ring-0 text-on-surface w-full placeholder:text-zinc-500 font-body-md text-body-md" placeholder="Search food or scan barcode" type="text"/>
<span class="material-symbols-outlined text-rose-500">barcode_scanner</span>
</div>
</section>
<!-- Meal Breakdown Bento Section -->
<section class="glass-card rounded-3xl p-lg relative overflow-hidden">
<div class="absolute -top-24 -right-24 w-48 h-48 bg-rose-500/10 blur-[80px]"></div>
<div class="flex justify-between items-start mb-lg">
<div>
<span class="font-label-caps text-label-caps text-zinc-500 block mb-xs">CURRENT MEAL</span>
<div class="flex items-baseline gap-xs">
<span class="font-numeric-data text-display-xl text-on-surface">770</span>
<span class="font-label-caps text-label-caps text-rose-500">KCAL</span>
</div>
</div>
<div class="p-3 rounded-2xl bg-white/5 border border-white/10">
<span class="material-symbols-outlined text-rose-500">restaurant</span>
</div>
</div>
<div class="grid grid-cols-3 gap-md">
<!-- Protein -->
<div class="flex flex-col items-center gap-sm">
<div class="relative w-14 h-14 flex items-center justify-center">
<svg class="w-full h-full transform -rotate-90">
<circle class="text-white/5" cx="28" cy="28" fill="transparent" r="24" stroke="currentColor" stroke-width="3"></circle>
<circle class="text-tertiary" cx="28" cy="28" fill="transparent" r="24" stroke="currentColor" stroke-dasharray="150" stroke-dashoffset="45" stroke-width="3"></circle>
</svg>
<span class="absolute font-numeric-data text-xs">64g</span>
</div>
<span class="font-label-caps text-[10px] text-zinc-400">PROTEIN</span>
</div>
<!-- Carbs -->
<div class="flex flex-col items-center gap-sm">
<div class="relative w-14 h-14 flex items-center justify-center">
<svg class="w-full h-full transform -rotate-90">
<circle class="text-white/5" cx="28" cy="28" fill="transparent" r="24" stroke="currentColor" stroke-width="3"></circle>
<circle class="text-secondary" cx="28" cy="28" fill="transparent" r="24" stroke="currentColor" stroke-dasharray="150" stroke-dashoffset="60" stroke-width="3"></circle>
</svg>
<span class="absolute font-numeric-data text-xs">42g</span>
</div>
<span class="font-label-caps text-[10px] text-zinc-400">CARBS</span>
</div>
<!-- Fats -->
<div class="flex flex-col items-center gap-sm">
<div class="relative w-14 h-14 flex items-center justify-center">
<svg class="w-full h-full transform -rotate-90">
<circle class="text-white/5" cx="28" cy="28" fill="transparent" r="24" stroke="currentColor" stroke-width="3"></circle>
<circle class="text-surface-tint" cx="28" cy="28" fill="transparent" r="24" stroke="currentColor" stroke-dasharray="150" stroke-dashoffset="90" stroke-width="3"></circle>
</svg>
<span class="absolute font-numeric-data text-xs">18g</span>
</div>
<span class="font-label-caps text-[10px] text-zinc-400">FATS</span>
</div>
</div>
</section>
<!-- Recently Eaten List -->
<section class="space-y-md">
<div class="flex justify-between items-center px-xs">

<button class="text-rose-500 font-label-caps text-label-caps hover:text-rose-400">SEE ALL</button>

<div class="space-y-md">
<!-- Item Card 1 -->

<div class="w-14 h-14 rounded-xl overflow-hidden border border-white/10">

<div>

<p class="font-body-md text-sm text-zinc-500">Lunch • 180g</p>
</div>
</div>
<div class="text-right">
<p class="font-numeric-data text-numeric-data text-rose-500">450</p>
<p class="font-label-caps text-[10px] text-zinc-500">KCAL</p>
</div>
</div>
<!-- Item Card 2 -->
<div class="glass-card rounded-2xl p-md flex items-center justify-between hover:bg-white/5 transition-colors group">

<div class="w-14 h-14 rounded-xl overflow-hidden border border-white/10">
<img class="w-full h-full object-cover" data-alt="fresh avocado toast with poached egg and chili flakes on artisan bread" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBVutPyHa-ctBBsP8fIDlOYEasT_QYCryyLFy2bGD3vkR5JTBj9eJ3ZjY0Akrn18UXUp5gG3akqnlEdvitw4dTFZj48qE4m0r2HE8NIvfYrvN3hJOGrLyufIlpvV3UPzaTzykU2fRAhx9UXATG8YfGXuv09xQx-fjGYUIZKRgEQgVqAQtX4YUHuYHmGPbd3swVDhNWkuqhu4yv2QNJwRTdOKivCSHnDgUYar2bDRIuUhdMMVAqBEqAKleedjLdNcCbcZErEWYG9cq8I"/>
</div>
<div>
<h3 class="font-body-lg text-body-lg font-semibold text-on-surface">Avocado Toast</h3>
<p class="font-body-md text-sm text-zinc-500">Breakfast • 1 slice</p>
</div>
</div>
<div class="text-right">
<p class="font-numeric-data text-numeric-data text-rose-500">320</p>
<p class="font-label-caps text-[10px] text-zinc-500">KCAL</p>
</div>
</div>
<!-- Item Card 3 -->
<div class="glass-card rounded-2xl p-md flex items-center justify-between hover:bg-white/5 transition-colors group">
<div class="flex items-center gap-md">
<div class="w-14 h-14 rounded-xl overflow-hidden border border-white/10">
<img class="w-full h-full object-cover" data-alt="colorful quinoa bowl with fresh vegetables and chickpeas in a minimalist ceramic bowl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC8ZZAnnSueObi0gzg8MVY7CqRe2xqcwoUXniQIL1HZ9-A2JKJ6Bra5dcdHb96GY57-A8nrdlC-9jcFLv_ZjMVUGMH5rP_5kBeMV-Sbaf8coSq7QcqHz-0wRHPK35uVxUM7QCHnInwTHI7dz6ECInNxz3pmydzbyoBUFkh8RBV2MyMrUwulHx7OhhF-c0W4Pq0avZHy3Jg-MFnf5jIH8Emf50I24Taf-RMdcaWrr3j0tLc4U_UGNTKc_8uO9A8eE9q78nDtKjD8wlXC"/>
</div>
<div>
<h3 class="font-body-lg text-body-lg font-semibold text-on-surface">Quinoa Salad</h3>

</div>
</div>
<div class="text-right">
<p class="font-numeric-data text-numeric-data text-rose-500">210</p>
<p class="font-label-caps text-[10px] text-zinc-500">KCAL</p>
</div>
</div>

<a class="flex flex-col items-center text-zinc-500 hover:text-rose-400 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">home</span>
</a>
<a class="relative flex flex-col items-center text-rose-500 after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-rose-500 after:rounded-full transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">restaurant</span>
</a>
<!-- Center Action Button -->
<button class="w-14 h-14 -mt-10 rounded-full bg-gradient-to-br from-rose-500 to-rose-600 flex items-center justify-center text-white shadow-[0_0_20px_rgba(244,63,94,0.4)] active:scale-90 duration-150 border-4 border-obsidian">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</button>
<a class="flex flex-col items-center text-zinc-500 hover:text-rose-400 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">analytics</span>
</a>
<a class="flex flex-col items-center text-zinc-500 hover:text-rose-400 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined">person</span>
</a>
</nav>
