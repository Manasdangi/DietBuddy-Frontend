<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#e7c365",
                    "tertiary-fixed": "#ffdf93",
                    "inverse-on-surface": "#f5eff7",
                    "background": "#fdf7ff",
                    "secondary-fixed": "#e9ddff",
                    "on-error": "#ffffff",
                    "inverse-primary": "#cfbcff",
                    "surface-dim": "#ded8e0",
                    "on-primary": "#ffffff",
                    "surface-container-highest": "#e6e0e9",
                    "on-tertiary-container": "#503d00",
                    "on-background": "#1d1b20",
                    "surface-container-low": "#f8f2fa",
                    "primary-container": "#6750a4",
                    "tertiary": "#765b00",
                    "on-primary-container": "#e0d2ff",
                    "on-tertiary-fixed": "#241a00",
                    "surface-bright": "#fdf7ff",
                    "primary-fixed-dim": "#cfbcff",
                    "secondary-fixed-dim": "#cdc0e9",
                    "inverse-surface": "#322f35",
                    "on-secondary-fixed-variant": "#4b4263",
                    "on-secondary-fixed": "#1f1635",
                    "outline": "#7a7582",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#e1d4fd",
                    "surface-variant": "#e6e0e9",
                    "on-tertiary": "#ffffff",
                    "surface-container-high": "#ece6ee",
                    "on-primary-fixed": "#22005d",
                    "primary": "#4f378a",
                    "surface-tint": "#6750a4",
                    "on-primary-fixed-variant": "#4f378a",
                    "surface-container": "#f2ecf4",
                    "error-container": "#ffdad6",
                    "tertiary-container": "#c9a74d",
                    "on-secondary-container": "#645a7d",
                    "secondary": "#63597c",
                    "error": "#ba1a1a",
                    "outline-variant": "#cbc4d2",
                    "primary-fixed": "#e9ddff",
                    "on-surface": "#1d1b20",
                    "on-surface-variant": "#494551",
                    "surface": "#fdf7ff",
                    "on-error-container": "#93000a",
                    "on-tertiary-fixed-variant": "#594400"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "2xl": "48px",
                    "container-padding": "20px",
                    "xs": "4px",
                    "lg": "24px",
                    "sm": "8px",
                    "xl": "32px",
                    "md": "16px",
                    "3xl": "64px",
                    "base": "4px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "display-xl": ["Inter"],
                    "headline-lg": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "letterSpacing": "0", "fontWeight": "400"}],
                    "display-xl": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}]
            }
          }
        }
      }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .rose-gradient {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
        }
        .rose-text-gradient {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .ring-progress {
            stroke-dasharray: 440;
            stroke-dashoffset: 110;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#FAFAFA] font-body-md text-on-surface min-h-screen pb-32">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-lg border-b border-zinc-100 dark:border-zinc-800 shadow-sm shadow-zinc-200/20 px-6 py-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="text-rose-500 dark:text-rose-400 active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-['Inter'] font-semibold tracking-tight text-zinc-900 dark:text-zinc-100 text-body-lg">Upper Body Power</h1>
</div>
<div class="font-black text-xl tracking-tighter text-zinc-900 dark:text-zinc-50">STRENGTH</div>
</header>
<main class="pt-24 px-container-padding space-y-xl">
<!-- Circular Progress Section -->
<section class="flex flex-col items-center justify-center py-lg">
<div class="relative w-64 h-64 flex items-center justify-center">
<svg class="w-full h-full">
<circle class="text-zinc-100" cx="128" cy="128" fill="transparent" r="110" stroke="currentColor" stroke-width="12"></circle>
<circle class="ring-progress" cx="128" cy="128" fill="transparent" r="110" stroke="url(#roseGradient)" stroke-linecap="round" stroke-width="12"></circle>
<defs>
<lineargradient id="roseGradient" x1="0%" x2="100%" y1="0%" y2="0%">
<stop offset="0%" stop-color="#f43f5e"></stop>
<stop offset="100%" stop-color="#e11d48"></stop>
</lineargradient>
</defs>
</svg>
<div class="absolute flex flex-col items-center text-center">
<span class="font-label-sm text-zinc-400">SESSION TIME</span>
<span class="font-display-xl text-zinc-900 tracking-tight">42:15</span>
<div class="flex items-center gap-1 text-rose-500 font-semibold">
<span class="material-symbols-outlined text-[18px]">play_arrow</span>
<span class="text-label-sm">ACTIVE</span>
</div>
</div>
</div>
</section>
<!-- Stats Grid -->
<div class="grid grid-cols-2 gap-md">
<!-- Heart Rate Card -->
<div class="bg-white border border-[#F4F4F5] rounded-xl p-md shadow-[0_10px_20px_rgba(0,0,0,0.03)] flex flex-col gap-sm">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined text-rose-500" data-icon="favorite" data-weight="fill" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-label-sm text-zinc-400 uppercase tracking-widest">HR</span>
</div>
<div>
<div class="font-headline-md text-zinc-900">142 <span class="text-body-md font-normal text-zinc-400">bpm</span></div>
<div class="h-1 w-full bg-zinc-100 rounded-full mt-2 overflow-hidden">
<div class="h-full bg-rose-500 w-[70%]"></div>
</div>
</div>
</div>
<!-- Calories Card -->
<div class="bg-white border border-[#F4F4F5] rounded-xl p-md shadow-[0_10px_20px_rgba(0,0,0,0.03)] flex flex-col gap-sm">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined text-orange-500" data-icon="local_fire_department" data-weight="fill" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-label-sm text-zinc-400 uppercase tracking-widest">CAL</span>
</div>
<div>
<div class="font-headline-md text-zinc-900">385 <span class="text-body-md font-normal text-zinc-400">kcal</span></div>
<div class="h-1 w-full bg-zinc-100 rounded-full mt-2 overflow-hidden">
<div class="h-full bg-orange-500 w-[55%]"></div>
</div>
</div>
</div>
</div>
<!-- Exercise List -->
<div class="space-y-lg">
<div class="flex items-center justify-between">
<h2 class="font-headline-md text-zinc-900">Exercises</h2>
<button class="text-rose-500 font-label-sm flex items-center gap-1 active:scale-95">
<span class="material-symbols-outlined text-[18px]">add_circle</span>
                    ADD MOVE
                </button>
</div>
<div class="space-y-md">
<!-- Exercise Item 1 -->
<div class="bg-white border border-[#F4F4F5] rounded-xl p-md shadow-[0_10px_20px_rgba(0,0,0,0.03)]">
<div class="flex gap-md">
<div class="w-16 h-16 rounded-lg overflow-hidden flex-shrink-0 bg-zinc-100">
<img alt="Workout exercise thumbnail" class="w-full h-full object-cover" data-alt="Detailed close-up of a high-quality chrome barbell with heavy plates in a modern minimalist gym setting with soft lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBp2eVEEqJmASKq5P1-n8Xh3UY6n_D94a0i74uyotEK4fnp6YSIbomrjszZpuzCB2psU5r6dl6LjZ0BqD00qNqWP7pEEPsi5pqlyD3G8Hb0bvMszvHQzIye9VD3gDUj6_EEGmeB7wUR50U3G3gHy0Af9ZnF7XL3aAWfcyAsOHlWwds1Wzj0VZ1Zkv7DbeYN0wJUJVtWjhiIH9IDekQA9KjhQMg37OgDlDo356VSyL3q-Z9wm2Lz_kUcn3gfg0di-GGWxmKUrc88PB2L"/>
</div>
<div class="flex-grow">
<div class="flex justify-between items-start">
<h3 class="font-body-lg font-bold text-zinc-900">Bench Press</h3>
<span class="material-symbols-outlined text-zinc-300">more_vert</span>
</div>
<div class="flex gap-sm mt-1">
<span class="bg-[#F4F4F5] text-zinc-600 font-label-sm px-2 py-0.5 rounded-full">Chest</span>
<span class="bg-[#F4F4F5] text-zinc-600 font-label-sm px-2 py-0.5 rounded-full">Compound</span>
</div>
</div>
</div>
<div class="mt-md space-y-sm">
<div class="grid grid-cols-4 font-label-sm text-zinc-400 px-2">
<span>SET</span>
<span>PREV</span>
<span>WEIGHT</span>
<span class="text-right">REPS</span>
</div>
<div class="grid grid-cols-4 items-center bg-zinc-50/50 rounded-lg p-2 font-body-md text-zinc-900">
<span class="font-bold text-rose-500">1</span>
<span class="text-zinc-400">80 kg</span>
<div class="flex items-center">
<input class="w-12 bg-transparent border-none p-0 focus:ring-0 font-bold" type="text" value="85"/>
<span class="text-xs text-zinc-400 ml-1">kg</span>
</div>
<div class="text-right flex justify-end items-center">
<input class="w-8 bg-transparent border-none p-0 focus:ring-0 font-bold text-right" type="text" value="8"/>
<span class="material-symbols-outlined text-emerald-500 ml-2" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<div class="grid grid-cols-4 items-center bg-white border border-[#F4F4F5] rounded-lg p-2 font-body-md text-zinc-900">
<span class="font-bold text-zinc-400">2</span>
<span class="text-zinc-400">80 kg</span>
<div class="flex items-center">
<input class="w-12 bg-transparent border-none p-0 focus:ring-0 font-bold" placeholder="--" type="text"/>
<span class="text-xs text-zinc-400 ml-1">kg</span>
</div>
<div class="text-right flex justify-end items-center">
<input class="w-8 bg-transparent border-none p-0 focus:ring-0 font-bold text-right" placeholder="--" type="text"/>
<span class="material-symbols-outlined text-zinc-200 ml-2">check_circle</span>
</div>
</div>
</div>
</div>
<!-- Exercise Item 2 -->
<div class="bg-white border border-[#F4F4F5] rounded-xl p-md shadow-[0_10px_20px_rgba(0,0,0,0.03)]">
<div class="flex gap-md">
<div class="w-16 h-16 rounded-lg overflow-hidden flex-shrink-0 bg-zinc-100">
<img alt="Workout exercise thumbnail" class="w-full h-full object-cover" data-alt="Close-up of matte black dumbbells resting on a rubber gym floor with cinematic shadows and soft warm highlights" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDPKrQrWCkpKB9qSUuz2JC2CJZp1L3GJKSpcjyFM3hh3glKUHhfd8ZlZq_a7iYQxE5hc4iFa6SZgid0ssWXDEjknfoUxUGnqqcaZpifKufV_ePfKte5IRHzFZ0hLSOq7tvrjviXx3LwzFG1XG45APKBI2VWb9bQa9OomdxX3niJWXPfpREOGGHxq_l6PdRR4QgNRXYbCFQxiuFXpTycs_OmuBhwpzcF9u3ovJcyQSxjXD3TVFPd2VmGaxYBgbiNj-mWjBFyYLPhm384"/>
</div>
<div class="flex-grow">
<div class="flex justify-between items-start">
<h3 class="font-body-lg font-bold text-zinc-900">Incline Dumbbell Fly</h3>
<span class="material-symbols-outlined text-zinc-300">more_vert</span>
</div>
<div class="flex gap-sm mt-1">
<span class="bg-[#F4F4F5] text-zinc-600 font-label-sm px-2 py-0.5 rounded-full">Upper Chest</span>
<span class="bg-[#F4F4F5] text-zinc-600 font-label-sm px-2 py-0.5 rounded-full">Isolation</span>
</div>
</div>
</div>
<button class="mt-md w-full py-sm border border-dashed border-zinc-200 rounded-lg text-zinc-400 font-label-sm flex items-center justify-center gap-2 hover:bg-zinc-50 transition-colors">
<span class="material-symbols-outlined text-[18px]">add</span>
                        ADD SET
                    </button>
</div>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full h-12 rose-gradient text-white font-bold rounded-full shadow-[0_10px_20px_rgba(244,63,94,0.3)] active:scale-95 transition-all">
                FINISH SESSION
            </button>
</div>
</main>
<!-- Bottom Navigation Dock -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-lg glass-panel rounded-full border border-zinc-100 dark:border-zinc-800 shadow-[0_20px_40px_rgba(0,0,0,0.08)] flex justify-around items-center h-16 px-4 z-50">
<button class="text-zinc-400 hover:text-rose-400 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="home">home</span>
</button>
<button class="text-zinc-400 hover:text-rose-400 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="restaurant_menu">restaurant_menu</span>
</button>
<button class="text-rose-500 scale-110 transition-transform active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="add_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</button>
<button class="text-zinc-400 hover:text-rose-400 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
</button>
<button class="text-zinc-400 hover:text-rose-400 transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="person">person</span>
</button>
</nav>
</body></html>
